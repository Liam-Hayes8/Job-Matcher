# Configuration for job filtering and ranking
settings:
  max_jobs_per_request: 50
  max_age_hours: 48  # Only return jobs posted in last 48 hours
  link_validation_timeout: 8  # seconds
  fetch_timeout: 12  # seconds total for all sources
  
# Keywords to prioritize for internship matching
internship_keywords:
  - "intern"
  - "internship"
  - "co-op"
  - "student"
  - "summer"
  - "graduate"
  - "entry level"
